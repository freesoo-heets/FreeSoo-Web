<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단체미로 공략 | FreeSoo 秀</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: #d4af37;
    font-family: 'Noto Serif KR', serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin: 30px 0;
}

.card {
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    margin-bottom: 25px;
    overflow: hidden;
}

.card h2 {
    margin: 15px;
    font-size: 20px;
}

.card p {
    margin: 0 15px 15px;
    color: #aaa;
}

.card img {
    width: 100%;
    cursor: pointer;
    transition: 0.2s;
}

.card img:hover {
    transform: scale(1.02);
}

/* 확대 */
.lightbox {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img {
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<div class="container">
<h1>단체미로 공략</h1>

<div id="maze"></div>

</div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>
const data = [
    {title:"1번 통로", desc:"입구 기준 첫 번째 이동 루트로 기본 동선 파악에 중요한 구간입니다."},
    {title:"지름길 통로", desc:"다음 통로 이동을 빠르게 이어주는 핵심 지름길 구간입니다."},
    {title:"2번 통로", desc:"두 번째 주요 이동 경로로 다른 통로와 연결되는 중간 단계입니다."},
    {title:"3번 통로", desc:"중앙에서 이어지는 이동 경로로 방향 혼동이 많은 구간입니다."},
    {title:"미로수렵지", desc:"사냥 및 이동이 동시에 이루어지는 핵심 지역입니다."},
    {title:"4번 통로", desc:"후반 이동 루트로 출구 방향과 연결되는 중요한 통로입니다."},
    {title:"미로마룡 위치", desc:"최종 목표 위치로 보스 및 핵심 도착 지점입니다."}
];

const container = document.getElementById("maze");

data.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h2>${i+1}. ${item.title}</h2>
        <p>${item.desc}</p>
        <img src="assets/maze/${i+1}.jpg">
    `;

    div.querySelector("img").onclick = () => openLightbox(`assets/maze/${i+1}.jpg`);

    container.appendChild(div);
});

// 확대 기능
function openLightbox(src){
    const box = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = src;
    box.style.display = "flex";
}

document.getElementById("lightbox").onclick = function(){
    this.style.display = "none";
};
</script>

</body>
</html>

<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FreeSoo 공략 상세</title><link rel="stylesheet" href="assets/site.css"><script src="site-config.js"></script><script src="assets/site.js"></script></head><body><header class="topbar"><div class="wrap topbar-inner"><a class="brand" href="index.html"><div class="brand-mark">秀</div><div class="brand-copy"><strong>FreeSoo 비공식 포털</strong><span>공지 · 공략집 · 무공 · 다운로드 · 문의 · 관리자</span></div></a><button class="menu-toggle" id="menuToggle" type="button">☰ 메뉴</button><nav class="nav" id="mainNav"><a href="index.html" data-nav="home">홈</a><a href="index.html#news" data-nav="news">공지</a><a href="guide-select.html" data-nav="guides">공략집</a><a href="skills.html" data-nav="skills">무공</a><a href="index.html#download" data-nav="download">다운로드</a><a href="index.html#contact" data-nav="contact">문의</a><a href="admin-guides.html" data-nav="admin-guides">가이드 관리</a><a href="admin-skills.html" data-nav="admin-skills">무공 관리</a></nav></div></header><main class="section"><div class="wrap"><div id="root" class="panel"><div class="empty">공략을 불러오는 중...</div></div></div></main><script>document.querySelector('[data-nav="guides"]').classList.add('active');const id=new URLSearchParams(location.search).get('id');fetch('guides.json').then(r=>r.json()).then(list=>{const g=(list||[]).find(x=>String(x.id)===String(id));if(!g) throw new Error('not found');document.title=g.title;const steps=(g.steps||[]).map((s,i)=>{const img=s.img||s.image||'';return `<div class="guide-step"><div class="badge">STEP ${i+1}</div><h3>${Freesoo.esc(s.title||('STEP '+(i+1)))}</h3><p>${Freesoo.esc(s.text||'')}</p>${img?`<img class="card-thumb" src="${Freesoo.esc(img)}" alt="">`:''}</div>`;}).join('') || '<div class="empty">등록된 단계가 없습니다.</div>';document.getElementById('root').innerHTML=`<div class="badge">${Freesoo.esc(g.category||'GUIDE')}</div><h1>${Freesoo.esc(g.title)}</h1><p>${Freesoo.esc(g.description||'')}</p><div class="controls"><a class="btn btn-primary" href="guide-select.html">공략집으로</a><a class="btn btn-secondary" href="index.html">메인으로</a></div><div class="list" style="margin-top:16px">${steps}</div>`;}).catch(()=>{document.getElementById('root').innerHTML='<div class="empty">guides.json 또는 id 값을 확인해 주세요.</div>';});</script></body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="assets/site.css" />
<script src="site-config.js"></script>
<script src="assets/site.js"></script>
  <title>FreeSoo 공략 상세</title>
  <meta name="description" content="단계별 이미지와 설명으로 구성된 프리수 공략 상세 페이지" />
</head>
<body>
<header class="topbar">
  <div class="wrap topbar-inner">
    <a class="brand" href="index.html">
      <div class="brand-mark">秀</div>
      <div class="brand-copy">
        <strong>FreeSoo 비공식 포털</strong>
        <span>공지 · 공략집 · 무공 · 다운로드 · 문의</span>
      </div>
    </a>
    <button class="menu-toggle" id="menuToggle" type="button">☰ 메뉴</button>
    <nav class="nav" id="mainNav">
      <a href="index.html" data-nav="home">홈</a>
      <a href="index.html#news" data-nav="news">공지</a>
      <a href="guide-select.html" data-nav="guides">공략집</a>
      <a href="skills.html" data-nav="skills">무공</a>
      <a href="index.html#download" data-nav="download">다운로드</a>
      <a href="index.html#contact" data-nav="contact">문의</a>
    </nav>
  </div>
</header>
  <main class="section">
    <div class="wrap">
      <div id="guideRoot" class="hero-panel"><div class="empty">공략을 불러오는 중...</div></div>
    </div>
  </main>

  <div id="imageViewer" class="viewer">
    <div class="viewer-panel">
      <div class="viewer-head">
        <strong id="imageViewerTitle">공략 이미지</strong>
        <button type="button" class="btn btn-secondary" id="imageViewerClose">닫기</button>
      </div>
      <img id="imageViewerImg" src="" alt="공략 이미지" style="width:100%; max-height:78vh; object-fit:contain; background:#000;" />
    </div>
  </div>

  <script>
    Freesoo.initMenu('guides');
    const params = new URLSearchParams(location.search);
    const guideId = params.get('id');
    const guideRoot = document.getElementById('guideRoot');
    const imageViewer = document.getElementById('imageViewer');
    const imageViewerImg = document.getElementById('imageViewerImg');
    const imageViewerTitle = document.getElementById('imageViewerTitle');

    function openImageViewer(src, title) {
      imageViewerImg.src = src;
      imageViewerTitle.textContent = title || '공략 이미지';
      imageViewer.classList.add('open');
    }
    function closeImageViewer() {
      imageViewer.classList.remove('open');
      imageViewerImg.src = '';
    }
    document.getElementById('imageViewerClose').addEventListener('click', closeImageViewer);
    imageViewer.addEventListener('click', e => { if (e.target === imageViewer) closeImageViewer(); });

    fetch('guides.json')
      .then(r => r.json())
      .then(list => {
        const guide = (list || []).find(item => String(item.id) === String(guideId));
        if (!guide) {
          guideRoot.innerHTML = `
            <div class="badge">GUIDE</div>
            <h1>공략을 찾을 수 없습니다.</h1>
            <p class="muted">guide.html?id=공략ID 형태로 접근해야 합니다.</p>
            <div class="controls">
              <a class="btn btn-primary" href="guide-select.html">공략집으로</a>
              <a class="btn btn-secondary" href="index.html">메인으로</a>
            </div>
          `;
          return;
        }
        guideRoot.innerHTML = `
          <div class="badge">${Freesoo.esc(guide.category || 'GUIDE')}</div>
          <h1>${Freesoo.esc(guide.title)}</h1>
          <p class="muted">${Freesoo.esc(guide.description || '')}</p>
          <div class="chip-row" style="margin-top: 12px;">
            <span class="chip">업데이트: ${Freesoo.esc(guide.updatedAt || '-')}</span>
            <span class="chip">STEP 수: ${guide.steps?.length || 0}</span>
          </div>
          <div class="controls" style="margin-top: 16px;">
            <a class="btn btn-primary" href="guide-select.html">공략집으로</a>
            <a class="btn btn-secondary" href="index.html">메인으로</a>
          </div>
          <div class="steps" style="margin-top: 20px;">
            ${(guide.steps || []).map((step, index) => `
              <article class="step-card">
                <div class="step-num">${index + 1}</div>
                <h3>${Freesoo.esc(step.title || `STEP ${index + 1}`)}</h3>
                <p class="muted">${Freesoo.esc(step.text || '')}</p>
                ${(step.img || step.image) ? `<img class="step-image" src="${Freesoo.esc(step.img || step.image)}" alt="${Freesoo.esc(step.title || `STEP ${index + 1}`)}">` : ''}
              </article>
            `).join('') || '<div class="empty">등록된 단계가 없습니다.</div>'}
          </div>
        `;
        guideRoot.querySelectorAll('.step-image').forEach(img => {
          img.addEventListener('click', () => openImageViewer(img.src, img.alt));
        });
      })
      .catch(() => {
        guideRoot.innerHTML = '<div class="empty">guides.json을 불러오지 못했습니다.</div>';
      });
  </script>
</body>
</html>

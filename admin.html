<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeSoo 관리자 보조 페이지</title>
  <style>
    :root{--bg:#0f0a07;--panel:rgba(28,18,12,.94);--line:rgba(255,182,98,.18);--text:#f8ead6;--muted:#d5b592;--shadow:0 18px 42px rgba(0,0,0,.35);--radius:20px;--max:1240px}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Serif KR","Malgun Gothic",serif;color:var(--text);background:radial-gradient(circle at top, rgba(255,130,38,.14), transparent 28%), linear-gradient(180deg,#17110d 0%,#090705 100%)}
    .wrap{width:min(calc(100% - 32px), var(--max));margin:0 auto;padding:30px 0 40px}
    a{color:inherit;text-decoration:none}
    .panel{background:linear-gradient(180deg, rgba(31,20,13,.94), rgba(17,12,9,.98));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .row{display:grid;gap:10px;margin-top:14px}
    input,textarea,select{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:14px;padding:12px 14px;font:inherit}
    textarea{min-height:110px;resize:vertical}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:14px;border:1px solid rgba(255,165,72,.24);background:rgba(255,255,255,.03);cursor:pointer;color:var(--text)}
    .primary{background:linear-gradient(135deg, rgba(255,154,61,.22), rgba(255,84,36,.24))}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;color:#ffd7b3}
    .help{color:var(--muted);line-height:1.8}
    .step-list{display:grid;gap:10px;margin-top:10px}
    .step-item{padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel" style="margin-bottom:18px">
      <h1 style="margin:0 0 10px">FreeSoo 관리자 보조 페이지</h1>
      <p class="help">
        이 페이지는 <strong>정적 사이트에서 JSON 파일을 쉽게 생성</strong>하기 위한 도구입니다.
        Netlify/GitHub 정적 구조에서는 브라우저가 서버 파일을 직접 덮어쓸 수 없기 때문에,
        여기서 만든 JSON을 <strong>다운로드 → GitHub 업로드</strong> 방식으로 운영해야 합니다.
      </p>
      <div class="btns">
        <a class="btn primary" href="index.html">메인으로</a>
        <a class="btn" href="guide-select.html">공략집으로</a>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2 style="margin-top:0">notices.json 생성</h2>
        <div class="row">
          <select id="noticeType">
            <option value="notice">공지</option>
            <option value="event">이벤트</option>
          </select>
          <input id="noticeTitle" placeholder="제목">
          <input id="noticeDate" placeholder="날짜 예: 2026-03-28">
          <input id="noticeTag" placeholder="태그 예: 점검 / 업데이트 / 이벤트">
          <textarea id="noticeSummary" placeholder="요약"></textarea>
          <label class="help"><input type="checkbox" id="noticePin"> 고정(pin)</label>
        </div>
        <div class="btns">
          <button class="btn primary" id="addNoticeBtn">항목 추가</button>
          <button class="btn" id="downloadNoticeBtn">notices.json 다운로드</button>
          <button class="btn" id="copyNoticeBtn">복사</button>
          <button class="btn" id="resetNoticeBtn">초기화</button>
        </div>
        <div class="help" style="margin-top:14px">현재 작성 데이터</div>
        <pre id="noticeOutput">{ "notices": [], "events": [] }</pre>
      </div>

      <div class="panel">
        <h2 style="margin-top:0">guides.json 생성</h2>
        <div class="row">
          <input id="guideId" placeholder="공략 ID 예: sagok-tomb">
          <input id="guideTitle" placeholder="공략 제목">
          <input id="guideCategory" placeholder="카테고리 예: 던전 / 길찾기 / 보스">
          <input id="guideThumb" placeholder="썸네일 경로 예: assets/guides/sagok-tomb/1.jpg">
          <input id="guideUpdated" placeholder="업데이트 날짜 예: 2026-03-28">
          <textarea id="guideDesc" placeholder="공략 설명"></textarea>
        </div>

        <div class="step-list" id="stepList"></div>
        <div class="btns">
          <button class="btn" id="addStepBtn">STEP 추가</button>
          <button class="btn primary" id="addGuideBtn">공략 추가</button>
          <button class="btn" id="downloadGuideBtn">guides.json 다운로드</button>
          <button class="btn" id="copyGuideBtn">복사</button>
          <button class="btn" id="resetGuideBtn">초기화</button>
        </div>
        <div class="help" style="margin-top:14px">현재 작성 데이터</div>
        <pre id="guideOutput">[]</pre>
      </div>
    </div>
  </div>

  <script>
    const noticeState = { notices: [], events: [] };
    const guideState = [];
    const stepList = document.getElementById('stepList');

    function downloadText(filename, text){
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        alert('복사되었습니다.');
      }catch{
        alert('복사에 실패했습니다. 수동으로 복사해 주세요.');
      }
    }

    function refreshNoticeOutput(){
      document.getElementById('noticeOutput').textContent = JSON.stringify(noticeState, null, 2);
    }
    function refreshGuideOutput(){
      document.getElementById('guideOutput').textContent = JSON.stringify(guideState, null, 2);
    }

    function createStepItem(){
      const div = document.createElement('div');
      div.className = 'step-item';
      div.innerHTML = `
        <input placeholder="STEP 제목 예: 1번 통로">
        <textarea placeholder="STEP 설명"></textarea>
        <input placeholder="이미지 경로 예: assets/guides/maze/1.jpg">
        <div class="btns"><button class="btn">삭제</button></div>
      `;
      div.querySelector('button').addEventListener('click', () => div.remove());
      stepList.appendChild(div);
    }

    document.getElementById('addStepBtn').addEventListener('click', createStepItem);
    createStepItem();

    document.getElementById('addNoticeBtn').addEventListener('click', () => {
      const item = {
        title: document.getElementById('noticeTitle').value.trim(),
        date: document.getElementById('noticeDate').value.trim(),
        tag: document.getElementById('noticeTag').value.trim(),
        summary: document.getElementById('noticeSummary').value.trim(),
        pin: document.getElementById('noticePin').checked
      };
      const type = document.getElementById('noticeType').value;
      if(!item.title){
        alert('제목을 입력해 주세요.');
        return;
      }
      if(type === 'event') noticeState.events.unshift(item);
      else noticeState.notices.unshift(item);
      refreshNoticeOutput();
    });

    document.getElementById('downloadNoticeBtn').addEventListener('click', () => {
      downloadText('notices.json', JSON.stringify(noticeState, null, 2));
    });
    document.getElementById('copyNoticeBtn').addEventListener('click', () => copyText(JSON.stringify(noticeState, null, 2)));
    document.getElementById('resetNoticeBtn').addEventListener('click', () => {
      noticeState.notices = [];
      noticeState.events = [];
      refreshNoticeOutput();
    });

    document.getElementById('addGuideBtn').addEventListener('click', () => {
      const steps = [...stepList.children].map(item => {
        const [titleEl, textEl, imgEl] = item.querySelectorAll('input, textarea');
        return {
          title: titleEl.value.trim(),
          text: textEl.value.trim(),
          img: imgEl.value.trim()
        };
      }).filter(step => step.title || step.text || step.img);

      const guide = {
        id: document.getElementById('guideId').value.trim(),
        title: document.getElementById('guideTitle').value.trim(),
        category: document.getElementById('guideCategory').value.trim(),
        thumbnail: document.getElementById('guideThumb').value.trim(),
        updatedAt: document.getElementById('guideUpdated').value.trim(),
        description: document.getElementById('guideDesc').value.trim(),
        steps
      };

      if(!guide.id || !guide.title){
        alert('공략 ID와 제목은 필수입니다.');
        return;
      }
      guideState.unshift(guide);
      refreshGuideOutput();
    });

    document.getElementById('downloadGuideBtn').addEventListener('click', () => {
      downloadText('guides.json', JSON.stringify(guideState, null, 2));
    });
    document.getElementById('copyGuideBtn').addEventListener('click', () => copyText(JSON.stringify(guideState, null, 2)));
    document.getElementById('resetGuideBtn').addEventListener('click', () => {
      guideState.length = 0;
      refreshGuideOutput();
    });

    refreshNoticeOutput();
    refreshGuideOutput();
  </script>
</body>
</html>

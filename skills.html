<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="assets/site.css" />
<script src="site-config.js"></script>
<script src="assets/site.js"></script>
  <title>FreeSoo 무공 설명서</title>
  <meta name="description" content="직업별 무공 설명서와 영상 미리보기를 제공하는 페이지" />
</head>
<body>
<header class="topbar">
  <div class="wrap topbar-inner">
    <a class="brand" href="index.html">
      <div class="brand-mark">秀</div>
      <div class="brand-copy">
        <strong>FreeSoo 비공식 포털</strong>
        <span>공지 · 공략집 · 무공 · 다운로드 · 문의</span>
      </div>
    </a>
    <button class="menu-toggle" id="menuToggle" type="button">☰ 메뉴</button>
    <nav class="nav" id="mainNav">
      <a href="index.html" data-nav="home">홈</a>
      <a href="index.html#news" data-nav="news">공지</a>
      <a href="guide-select.html" data-nav="guides">공략집</a>
      <a href="skills.html" data-nav="skills">무공</a>
      <a href="index.html#download" data-nav="download">다운로드</a>
      <a href="index.html#contact" data-nav="contact">문의</a>
    </nav>
  </div>
</header>
  <main class="section">
    <div class="wrap">
      <div class="hero-panel">
        <div class="eyebrow">skills</div>
        <h1>무공 설명서</h1>
        <p>썸네일을 먼저 보여주고, 재생 버튼을 눌렀을 때만 영상을 로딩합니다. 영상이 없으면 자동으로 숨깁니다.</p>
        <div class="grid-4">
          <input id="q" class="input" placeholder="무공명 / 설명 검색" />
          <select id="jobFilter" class="select"><option value="">전체 직업</option></select>
        </div>
        <div class="chip-row" style="margin-top: 12px;">
          <span class="chip">CDN: <span id="cdnText"></span></span>
          <span class="chip">자동재생 꺼짐</span>
          <span class="chip">라이트박스 지원</span>
        </div>
      </div>
      <div class="section-head" style="margin-top: 16px;">
        <div><h2>무공 목록</h2><p class="count" id="countText">총 0개</p></div>
      </div>
      <div id="skillCards" class="skills-grid"></div>
    </div>
  </main>

  <div id="viewer" class="viewer">
    <div class="viewer-panel">
      <div class="viewer-head">
        <strong id="viewerTitle">무공 영상</strong>
        <button type="button" class="btn btn-secondary" id="viewerClose">닫기</button>
      </div>
      <video id="viewerVideo" controls preload="metadata" playsinline></video>
    </div>
  </div>

  <script>
    Freesoo.initMenu('skills');
    const params = new URLSearchParams(location.search);
    const preselectedJob = params.get('job') || '';
    const viewer = document.getElementById('viewer');
    const viewerVideo = document.getElementById('viewerVideo');
    const viewerTitle = document.getElementById('viewerTitle');
    let jobs = [];

    document.getElementById('cdnText').textContent = window.FREESOO_CONFIG?.CDN_BASE || '로컬 경로';

    function openViewer(src, title) {
      viewerTitle.textContent = title || '무공 영상';
      viewerVideo.src = src;
      viewer.classList.add('open');
    }
    function closeViewer() {
      viewerVideo.pause();
      viewerVideo.removeAttribute('src');
      viewerVideo.load();
      viewer.classList.remove('open');
    }
    document.getElementById('viewerClose').addEventListener('click', closeViewer);
    viewer.addEventListener('click', e => { if (e.target === viewer) closeViewer(); });

    function createMediaMarkup(skill) {
      const videoPath = Freesoo.resolveMedia(skill.video || `video/${skill.jobId}_${skill.name}.mp4`);
      const thumbPath = Freesoo.resolveMedia(skill.thumbnail || `thumb/${skill.jobId}_${skill.name}.jpg`);
      return `
        <div class="media-wrap" data-video="${Freesoo.esc(videoPath)}" data-title="${Freesoo.esc(skill.name)}">
          <div class="video-shell">
            <img class="video-poster" src="${Freesoo.esc(thumbPath)}" alt="${Freesoo.esc(skill.name)} 썸네일" loading="lazy">
            <div class="video-overlay" role="button" tabindex="0"><div class="play-badge"></div></div>
          </div>
          <div class="video-fallback muted hidden">등록된 영상이 없습니다.</div>
        </div>
      `;
    }

    function loadCardVideo(mediaWrap) {
      if (!mediaWrap || mediaWrap.dataset.loaded === '1') return;
      const videoSrc = mediaWrap.dataset.video;
      const title = mediaWrap.dataset.title || '무공 영상';
      const shell = mediaWrap.querySelector('.video-shell');
      const poster = mediaWrap.querySelector('.video-poster');
      const overlay = mediaWrap.querySelector('.video-overlay');
      const fallback = mediaWrap.querySelector('.video-fallback');
      const video = document.createElement('video');
      video.className = 'skill-video';
      video.controls = true;
      video.preload = 'metadata';
      video.playsInline = true;
      video.src = videoSrc;
      video.addEventListener('loadedmetadata', () => {
        mediaWrap.dataset.loaded = '1';
        if (poster) poster.style.display = 'none';
        if (overlay) overlay.style.display = 'none';
      }, { once: true });
      video.addEventListener('error', () => {
        if (poster) poster.style.display = 'none';
        if (overlay) overlay.style.display = 'none';
        video.remove();
        fallback?.classList.remove('hidden');
      }, { once: true });
      video.addEventListener('click', () => openViewer(videoSrc, title));
      shell.prepend(video);
      video.play().catch(() => {});
    }

    function bindMediaEvents() {
      document.querySelectorAll('.media-wrap').forEach(mediaWrap => {
        const poster = mediaWrap.querySelector('.video-poster');
        const overlay = mediaWrap.querySelector('.video-overlay');
        poster?.addEventListener('error', () => { poster.style.display = 'none'; }, { once: true });
        overlay?.addEventListener('click', () => loadCardVideo(mediaWrap));
        overlay?.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            loadCardVideo(mediaWrap);
          }
        });
      });
    }

    function renderSkills() {
      const keyword = (document.getElementById('q').value || '').trim().toLowerCase();
      const jobFilter = document.getElementById('jobFilter').value;
      const merged = [];
      jobs.forEach(job => {
        (job.skills || []).forEach(skill => merged.push({ ...skill, jobId: job.id, jobName: job.name }));
      });
      const filtered = merged.filter(skill => {
        const haystack = [skill.name, skill.desc, (skill.tags || []).join(' '), skill.jobName].join(' ').toLowerCase();
        return (!keyword || haystack.includes(keyword)) &&
       (!jobFilter || skill.jobId === jobFilter);
      });
      document.getElementById('countText').textContent = `총 ${filtered.length}개`;
      document.getElementById('skillCards').innerHTML = filtered.length
        ? filtered.map(skill => `
            <article class="skill-card">
              <div class="badge">${Freesoo.esc(skill.jobName)}</div>
              <h3>${Freesoo.esc(skill.name)}</h3>
              <p class="muted">${Freesoo.esc(skill.desc || '')}</p>
              ${createMediaMarkup(skill)}
            </article>
          `).join('')
        : '<div class="empty">조건에 맞는 무공이 없습니다.</div>';
      bindMediaEvents();
    }

    fetch('data/skills.json')
      .then(r => r.json())
      .then(data => {
        jobs = data.jobs || [];
        const jobFilter = document.getElementById('jobFilter');
        jobs.forEach(job => {
          jobFilter.insertAdjacentHTML('beforeend', `<option value="${Freesoo.esc(job.id)}">${Freesoo.esc(job.name)}</option>`);
        });
        if (preselectedJob) jobFilter.value = preselectedJob;
        renderSkills();
      });

    ['q', 'jobFilter'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderSkills); 
      document.getElementById(id).addEventListener('change', renderSkills);
    });
  </script>
</body>
</html>

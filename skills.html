<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FreeSoo 무공 설명서</title><link rel="stylesheet" href="assets/site.css"><script src="site-config.js"></script><script src="assets/site.js"></script></head><body><header class="topbar"><div class="wrap topbar-inner"><a class="brand" href="index.html"><div class="brand-mark">秀</div><div class="brand-copy"><strong>FreeSoo 비공식 포털</strong><span>공지 · 공략집 · 무공 · 다운로드 · 문의 · 관리자</span></div></a><button class="menu-toggle" id="menuToggle" type="button">☰ 메뉴</button><nav class="nav" id="mainNav"><a href="index.html" data-nav="home">홈</a><a href="index.html#news" data-nav="news">공지</a><a href="guide-select.html" data-nav="guides">공략집</a><a href="skills.html" data-nav="skills">무공</a><a href="index.html#download" data-nav="download">다운로드</a><a href="index.html#contact" data-nav="contact">문의</a><a href="admin-guides.html" data-nav="admin-guides">가이드 관리</a><a href="admin-skills.html" data-nav="admin-skills">무공 관리</a></nav></div></header><main class="section"><div class="wrap"><div class="hero-panel"><div class="eyebrow">skills</div><h1>무공 설명서</h1><p>실제 jobKey와 무공 데이터를 기준으로 skills.json으로 분리한 통합본입니다.</p><div class="grid-4"><input id="q" class="input" placeholder="무공명 / 설명 / 태그 검색"><select id="jobFilter" class="select"><option value="">전체 직업</option></select><select id="typeFilter" class="select"><option value="">전체 분류</option><option>공격</option><option>CC</option><option>버프</option><option>유틸</option><option>이동</option><option>소환</option><option>디버프</option></select><select id="tagFilter" class="select"><option value="">전체 태그</option><option>딜</option><option>CC</option><option>버프</option><option>유틸</option><option>이동</option><option>소환</option><option>디버프</option></select></div></div><div class="section-head" style="margin-top:16px"><div><h2>무공 목록</h2><p class="count" id="countText"></p></div></div><div id="skillCards" class="cards"></div></div></main><script>document.querySelector('[data-nav="skills"]').classList.add('active');let jobs=[];const params=new URLSearchParams(location.search);const jobParam=params.get('job');function render(){const q=(document.getElementById('q').value||'').toLowerCase().trim();const jf=document.getElementById('jobFilter').value;const tf=document.getElementById('typeFilter').value;const tagf=document.getElementById('tagFilter').value;const items=[];jobs.forEach(job=>{(job.skills||[]).forEach(s=>items.push(Object.assign({}, s, {jobId:job.id, jobName:job.name})));});const filtered=items.filter(s=>{const text=[s.name,s.desc,(s.tags||[]).join(' '),s.jobName].join(' ').toLowerCase();return (!q||text.includes(q))&&(!jf||s.jobId===jf||s.jobName===jf)&&(!tf||s.type===tf)&&(!tagf||(s.tags||[]).includes(tagf));});document.getElementById('countText').textContent=`총 ${filtered.length}개`;document.getElementById('skillCards').innerHTML=filtered.length?filtered.map(s=>{const video=Freesoo.resolveMedia(s.video);const thumb=Freesoo.resolveMedia(s.thumbnail);return `<article class="card"><div class="badge">${Freesoo.esc(s.jobName)} · ${Freesoo.esc(s.type||'무공')}</div><h3>${Freesoo.esc(s.name)}</h3><p>${Freesoo.esc(s.desc||'')}</p><div class="controls">${(s.tags||[]).map(t=>`<span class="chip">${Freesoo.esc(t)}</span>`).join('')}</div><div style="margin-top:12px"></div>${thumb?`<img class="card-thumb" src="${thumb}" alt="">`:''}<video class="skill-video" src="${video}" controls preload="none" poster="${thumb||''}"></video><div class="muted" style="margin-top:8px">${Freesoo.esc(video)}</div></article>`;}).join(''):'<div class="empty">조건에 맞는 무공이 없습니다.</div>';}fetch('data/skills.json').then(r=>r.json()).then(data=>{jobs=data.jobs||[];const jf=document.getElementById('jobFilter');jobs.forEach(job=>jf.insertAdjacentHTML('beforeend', `<option value="${Freesoo.esc(job.id)}">${Freesoo.esc(job.name)}</option>`));if(jobParam) jf.value=jobParam;render();});['q','jobFilter','typeFilter','tagFilter'].forEach(id=>{document.getElementById(id).addEventListener('input', render);document.getElementById(id).addEventListener('change', render);});</script></body></html>

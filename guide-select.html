<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공략집 | FreeSoo 秀</title>
  <meta name="description" content="FreeSoo 공략집 목록 페이지" />
  <style>
    :root{
      --bg:#0a0a0a;
      --panel:#151515;
      --line:#ff7a00;
      --gold:#d8a24a;
      --gold-soft:#f2c16f;
      --text:#f3e7d0;
      --muted:#b5a587;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --wrap:1200px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font-family:"Noto Sans KR","Malgun Gothic",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,122,0,.07), transparent 20%),
        linear-gradient(180deg,#090707 0%, #0a0a0a 100%);
    }
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .wrap{width:min(calc(100% - 24px), var(--wrap));margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:1000;
      background:rgba(10,10,10,.88);
      border-bottom:1px solid rgba(255,122,0,.18);
      backdrop-filter:blur(10px);
    }
    .topbar-inner{
      min-height:68px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{
      width:42px;height:42px;border-radius:12px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--gold-soft),var(--gold));
      color:#1b1103;font-weight:900;font-size:22px;
    }
    .brand-text strong{display:block;font-size:17px}
    .brand-text span{display:block;font-size:12px;color:var(--muted)}
    .nav-links{display:flex;gap:8px;flex-wrap:wrap}
    .nav-links a{
      background:#161616;
      border:1px solid rgba(255,122,0,.18);
      color:var(--gold-soft);
      padding:10px 14px;
      border-radius:10px;
      font-size:14px;
      font-weight:700;
    }

    .hero{padding:30px 0 16px}
    .hero-card{
      background:linear-gradient(180deg,#171717,#101010);
      border:1px solid rgba(255,122,0,.22);
      border-radius:24px;
      padding:28px;
      box-shadow:var(--shadow);
    }
    .badge{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(255,122,0,.08);
      border:1px solid rgba(255,122,0,.25);
      color:var(--gold-soft);
      font-size:12px;
      font-weight:800;
    }
    h1{
      margin:14px 0 10px;
      font-size:clamp(28px,4vw,42px);
      color:var(--gold-soft);
      font-family:"Noto Serif KR","Nanum Myeongjo",serif;
    }
    .hero p{
      margin:0;
      color:#d7c8af;
      line-height:1.7;
      font-size:15px;
    }

    .section{padding:12px 0 50px}
    .section-title{
      margin:0 0 18px;
      font-size:28px;
      color:var(--gold-soft);
      font-family:"Noto Serif KR","Nanum Myeongjo",serif;
    }

    .guide-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }
    .guide-card{
      background:linear-gradient(180deg,#171717,#111);
      border:1px solid rgba(255,122,0,.2);
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .18s ease, border-color .18s ease;
    }
    .guide-card:hover{
      transform:translateY(-4px);
      border-color:rgba(255,122,0,.35);
    }
    .thumb{
      aspect-ratio: 16 / 10;
      overflow:hidden;
      background:#050505;
      border-bottom:1px solid rgba(255,122,0,.14);
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .guide-body{
      padding:16px;
    }
    .guide-type{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      color:#1b1103;
      background:linear-gradient(135deg,var(--gold-soft),var(--gold));
      margin-bottom:10px;
    }
    .guide-body h3{
      margin:0 0 8px;
      font-size:22px;
      color:var(--gold-soft);
      font-family:"Noto Serif KR","Nanum Myeongjo",serif;
    }
    .guide-body p{
      margin:0 0 14px;
      color:#d7c8af;
      font-size:14px;
      line-height:1.7;
      min-height:72px;
    }
    .guide-btn{
      display:inline-block;
      background:#1a1a1a;
      border:1px solid rgba(255,122,0,.22);
      color:var(--gold-soft);
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      font-size:14px;
    }

    .empty-box{
      background:#171717;
      border:1px dashed rgba(255,122,0,.3);
      border-radius:18px;
      padding:24px;
      color:var(--muted);
      line-height:1.7;
    }

    @media (max-width: 980px){
      .guide-grid{grid-template-columns:repeat(2, 1fr)}
    }
    @media (max-width: 640px){
      .topbar-inner{flex-direction:column;align-items:flex-start;padding:12px 0}
      .guide-grid{grid-template-columns:1fr}
      .hero-card{padding:22px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a href="./index.html" class="brand">
        <div class="brand-mark">秀</div>
        <div class="brand-text">
          <strong>FreeSoo 秀</strong>
          <span>공략집 선택 화면</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="./index.html">홈으로</a>
        <a href="./admin.html">관리도우미</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-card">
        <span class="badge">GUIDE SELECT</span>
        <h1>공략집</h1>
        <p>던전, 미로, 이동 경로, 보스 위치 등 공략 자료를 한곳에서 선택해 볼 수 있는 화면입니다.</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">공략 목록</h2>
      <div id="guideGrid" class="guide-grid"></div>
    </section>
  </main>

  <script>
    const $guideGrid = document.getElementById('guideGrid');

    function escapeHtml(text = '') {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderEmpty() {
      $guideGrid.outerHTML = `
        <div class="empty-box">
          등록된 공략이 없습니다. <strong>guides.json</strong> 파일에 공략 데이터를 추가해주세요.
        </div>
      `;
    }

    async function init() {
      try {
        const res = await fetch('./guides.json', { cache: 'no-store' });
        const guides = await res.json();

        if (!Array.isArray(guides) || !guides.length) {
          renderEmpty();
          return;
        }

        $guideGrid.innerHTML = guides.map(guide => `
          <a class="guide-card" href="./guide.html?id=${encodeURIComponent(guide.id)}">
            <div class="thumb">
              <img src="${escapeHtml(guide.thumbnail || guide.image || '')}" alt="${escapeHtml(guide.title || '공략 썸네일')}" />
            </div>
            <div class="guide-body">
              <span class="guide-type">${guide.type === 'single' ? '단일 이미지형' : '다중 이미지형'}</span>
              <h3>${escapeHtml(guide.title || '제목 없음')}</h3>
              <p>${escapeHtml(guide.description || '설명이 없습니다.')}</p>
              <span class="guide-btn">공략 보기</span>
            </div>
          </a>
        `).join('');
      } catch (err) {
        renderEmpty();
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeSoo 공략집</title>
  <style>
    :root{
      --bg:#0f0a07;--panel:rgba(28,18,12,.94);--line:rgba(255,182,98,.18);
      --text:#f8ead6;--muted:#d5b592;--accent:#ff9b37;--shadow:0 18px 42px rgba(0,0,0,.35);--radius:20px;--max:1240px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:"Noto Serif KR","Malgun Gothic",serif;color:var(--text);
      background:radial-gradient(circle at top, rgba(255,130,38,.14), transparent 28%), linear-gradient(180deg,#17110d 0%,#090705 100%);}
    a{color:inherit;text-decoration:none}.wrap{width:min(calc(100% - 32px), var(--max));margin:0 auto}
    .top{padding:30px 0 10px}.head,.card{background:linear-gradient(180deg, rgba(31,20,13,.94), rgba(17,12,9,.98));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .head{padding:28px}.head p{color:var(--muted);line-height:1.75}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:14px;border:1px solid rgba(255,165,72,.24);background:rgba(255,255,255,.03)}
    .btn.primary{background:linear-gradient(135deg, rgba(255,154,61,.22), rgba(255,84,36,.24))}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:18px 0}
    input,select{width:100%;max-width:260px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:14px;padding:12px 14px;font:inherit}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;padding-bottom:30px}
    .card{padding:18px;display:flex;flex-direction:column;gap:12px}
    .card img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
    .badge{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;font-size:.78rem;color:#ffd7b3;background:rgba(255,146,63,.1);border:1px solid rgba(255,165,72,.2)}
    .meta{color:#e9c7a4;font-size:.85rem}
    .empty{color:var(--muted)}
    @media (max-width:1024px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:760px){.grid{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>
  <div class="wrap top">
    <div class="head">
      <div class="badge">GUIDE HUB</div>
      <h1 style="margin:10px 0 12px">FreeSoo 공략집</h1>
      <p>guides.json을 기반으로 자동 렌더링되는 공략 허브입니다. 공략 카드를 누르면 guide.html에서 상세 단계가 자동으로 열립니다.</p>
      <div class="actions">
        <a class="btn primary" href="index.html">메인으로</a>
        <a class="btn" href="admin.html">관리 페이지</a>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="공략 제목 검색">
      <select id="categoryFilter">
        <option value="">전체 카테고리</option>
      </select>
    </div>

    <div class="grid" id="guideGrid">
      <div class="card"><div class="empty">공략을 불러오는 중...</div></div>
    </div>
  </div>

  <script>
    const guideGrid = document.getElementById('guideGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    let guideItems = [];

    function esc(value){
      return String(value ?? '')
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
    }

    function getPreview(item){
      const firstStep = Array.isArray(item.steps) && item.steps.length ? item.steps[0] : null;
      return item.thumbnail || firstStep?.img || '';
    }

    function render(){
      const keyword = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;
      const filtered = guideItems.filter(item => {
        const okKeyword = !keyword || String(item.title || '').toLowerCase().includes(keyword) || String(item.description || '').toLowerCase().includes(keyword);
        const okCategory = !category || item.category === category;
        return okKeyword && okCategory;
      });

      if(!filtered.length){
        guideGrid.innerHTML = '<div class="card"><div class="empty">조건에 맞는 공략이 없습니다.</div></div>';
        return;
      }

      guideGrid.innerHTML = filtered.map(item => `
        <a class="card" href="guide.html?id=${encodeURIComponent(item.id || '')}">
          <div class="badge">${esc(item.category || 'GUIDE')}</div>
          ${getPreview(item) ? `<img src="${esc(getPreview(item))}" alt="${esc(item.title || '공략 썸네일')}" loading="lazy">` : ''}
          <h3 style="margin:0">${esc(item.title || '제목 없음')}</h3>
          <p style="margin:0;color:#d5b592;line-height:1.7">${esc(item.description || '')}</p>
          <div class="meta">단계 수: ${Array.isArray(item.steps) ? item.steps.length : 0}</div>
        </a>
      `).join('');
    }

    fetch('guides.json')
      .then(res => {
        if(!res.ok) throw new Error('guides.json 로드 실패');
        return res.json();
      })
      .then(data => {
        guideItems = Array.isArray(data) ? data : [];
        const categories = [...new Set(guideItems.map(item => item.category).filter(Boolean))];
        categoryFilter.innerHTML += categories.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
        render();
      })
      .catch(() => {
        guideGrid.innerHTML = '<div class="card"><div class="empty">guides.json을 찾지 못했습니다.</div></div>';
      });

    searchInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);
  </script>
</body>
</html>

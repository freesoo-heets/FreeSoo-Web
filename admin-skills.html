<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>무공 관리자</title><link rel="stylesheet" href="assets/site.css"><script src="site-config.js"></script><script src="assets/site.js"></script></head><body><header class="topbar"><div class="wrap topbar-inner"><a class="brand" href="index.html"><div class="brand-mark">秀</div><div class="brand-copy"><strong>FreeSoo 비공식 포털</strong><span>공지 · 공략집 · 무공 · 다운로드 · 문의 · 관리자</span></div></a><button class="menu-toggle" id="menuToggle" type="button">☰ 메뉴</button><nav class="nav" id="mainNav"><a href="index.html" data-nav="home">홈</a><a href="index.html#news" data-nav="news">공지</a><a href="guide-select.html" data-nav="guides">공략집</a><a href="skills.html" data-nav="skills">무공</a><a href="index.html#download" data-nav="download">다운로드</a><a href="index.html#contact" data-nav="contact">문의</a><a href="admin-guides.html" data-nav="admin-guides">가이드 관리</a><a href="admin-skills.html" data-nav="admin-skills">무공 관리</a></nav></div></header><main class="section"><div class="wrap"><div id="loginBox" class="panel" style="max-width:520px;margin:30px auto"><div class="badge">ADMIN</div><h1>무공 관리자</h1><p>페이지 비밀번호와 R2 업로드 토큰을 입력하세요.</p><input id="pw" class="input" type="password" placeholder="관리자 비밀번호"><input id="token" class="input" type="password" placeholder="R2 업로드 토큰" style="margin-top:10px"><button id="loginBtn" class="btn btn-primary" style="margin-top:12px">입장</button></div><div id="app" class="hidden"><div class="hero-panel"><div class="eyebrow">admin skills</div><h1>무공 편집 / 영상 업로드</h1><p>영상 업로드, 썸네일 자동 생성, JSON 편집, 즉시 미리보기를 한 화면에서 처리할 수 있습니다.</p><div class="controls"><button class="btn btn-secondary" id="newSkillBtn">새 무공</button><button class="btn btn-secondary" id="saveLocalBtn">로컬 저장</button><button class="btn btn-primary" id="downloadBtn">skills.json 다운로드</button></div></div><div class="split" style="margin-top:16px"><aside class="sticky-col"><div class="list" id="jobList"></div><div class="list" id="skillList" style="margin-top:16px"></div></aside><section class="admin-shell"><div class="grid-2"><div><label>직업</label><select id="jobId" class="select"></select></div><div><label>무공명</label><input id="sname" class="input"></div><div><label>분류</label><select id="stype" class="select"><option>공격</option><option>CC</option><option>버프</option><option>유틸</option><option>이동</option><option>소환</option><option>디버프</option></select></div><div><label>태그</label><input id="stags" class="input" placeholder="쉼표로 구분"></div></div><div style="margin-top:10px"><label>설명</label><textarea id="sdesc" class="textarea"></textarea></div><div class="grid-2" style="margin-top:10px"><div><label>영상 경로</label><input id="svideo" class="input"></div><div><label>썸네일 경로</label><input id="sthumb" class="input"></div></div><div class="dropzone" id="videoDrop" style="margin-top:12px">영상 드래그드롭 또는 클릭 업로드 · 업로드 후 썸네일 자동 생성<input id="videoFile" class="hidden" type="file" accept="video/mp4,video/webm,video/quicktime"></div><div class="controls" style="margin-top:12px"><button class="btn btn-secondary" id="regenThumbBtn">현재 영상으로 썸네일 다시 생성</button><button class="btn btn-danger" id="deleteSkillBtn">현재 무공 삭제</button></div><div class="section-head" style="margin-top:16px"><div><h2>실시간 미리보기</h2></div></div><div id="previewBox"></div></section></div></div></div></main><script>const ADMIN_PASSWORD='FREESOO0160';document.querySelector('[data-nav="admin-skills"]').classList.add('active');let UPLOAD_TOKEN='';let data=Freesoo.getLocal('skillsData', null);let currentJob='warrior';let currentIndex=0;let lastVideoFile=null;const nameMap={common:'공통',warrior:'전사',taoist:'도사',sorcerer:'술사',assassin:'자객',archer:'궁사',magic:'원사'};const el=id=>document.getElementById(id);el('loginBtn').onclick=()=>{if(el('pw').value!==ADMIN_PASSWORD) return alert('비밀번호가 다릅니다.');UPLOAD_TOKEN=el('token').value.trim();el('loginBox').classList.add('hidden');el('app').classList.remove('hidden');init();};async function init(){if(!data) data=await fetch('data/skills.json').then(r=>r.json());renderJobs();loadJob(currentJob);}function renderJobs(){const jobs=data.jobs||[];el('jobList').innerHTML=jobs.map(j=>`<button class="btn ${j.id===currentJob?'btn-primary':'btn-secondary'}" data-job="${j.id}">${j.name}</button>`).join('');el('jobList').querySelectorAll('[data-job]').forEach(b=>b.onclick=()=>loadJob(b.dataset.job));el('jobId').innerHTML=jobs.map(j=>`<option value="${j.id}">${j.name}</option>`).join('');}function loadJob(jobId){currentJob=jobId;currentIndex=0;renderJobs();renderSkillList();loadSkill(0);}function renderSkillList(){const job=(data.jobs||[]).find(j=>j.id===currentJob);const skills=job?.skills||[];el('skillList').innerHTML=skills.map((s,i)=>`<button class="btn ${i===currentIndex?'btn-primary':'btn-secondary'}" data-i="${i}">${Freesoo.esc(s.name||('무공 '+(i+1)))}</button>`).join('') + `<button class="btn btn-secondary" id="addSkillInline">+ 새 무공</button>`;el('skillList').querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>loadSkill(Number(b.dataset.i)));el('addSkillInline').onclick=addSkill;}function loadSkill(i){currentIndex=i;renderSkillList();const job=(data.jobs||[]).find(j=>j.id===currentJob);const s=(job?.skills||[])[i] || {name:'',desc:'',type:'공격',tags:[],video:'',thumbnail:''};el('jobId').value=currentJob;el('sname').value=s.name||'';el('stype').value=s.type||'공격';el('stags').value=(s.tags||[]).join(', ');el('sdesc').value=s.desc||'';el('svideo').value=s.video ? Freesoo.resolveMedia(s.video) : '';el('sthumb').value=s.thumbnail ? Freesoo.resolveMedia(s.thumbnail) : '';renderPreview();}function stripCdn(v){const base=(Freesoo.cfg.CDN_BASE||'').replace(/\/$/,'');return base&&v.startsWith(base+'/') ? v.slice(base.length+1) : v;}function buildVideoPath(jobId,name){return `video/${jobId}_${name}.mp4`;}function buildThumbPath(jobId,name){return `thumbs/${jobId}_${name}.jpg`;}function syncSkill(){const jobs=data.jobs||[];let job=jobs.find(j=>j.id===el('jobId').value);if(!job) return;if(job.id!==currentJob){currentJob=job.id;renderJobs();}if(!job.skills) job.skills=[];const name=el('sname').value.trim();const relVideo=buildVideoPath(job.id,name);const relThumb=buildThumbPath(job.id,name);job.skills[currentIndex]={name,desc:el('sdesc').value.trim(),type:el('stype').value,tags:el('stags').value.split(',').map(v=>v.trim()).filter(Boolean),video:stripCdn(el('svideo').value.trim())||relVideo,thumbnail:stripCdn(el('sthumb').value.trim())||relThumb};renderSkillList();renderPreview();}function renderPreview(){const video=el('svideo').value.trim();const thumb=el('sthumb').value.trim();el('previewBox').innerHTML=`<article class="card"><div class="badge">${Freesoo.esc(nameMap[el('jobId').value]||el('jobId').value)} · ${Freesoo.esc(el('stype').value)}</div><h3>${Freesoo.esc(el('sname').value||'무공명')}</h3><p>${Freesoo.esc(el('sdesc').value||'')}</p><div class="controls">${el('stags').value.split(',').map(v=>v.trim()).filter(Boolean).map(t=>`<span class="chip">${Freesoo.esc(t)}</span>`).join('')}</div>${thumb?`<img class="card-thumb" src="${Freesoo.esc(thumb)}">`:''}${video?`<video class="skill-video" src="${Freesoo.esc(video)}" controls preload="none" poster="${Freesoo.esc(thumb)}"></video>`:''}</article>`;}function addSkill(){const job=(data.jobs||[]).find(j=>j.id===currentJob);job.skills.push({name:'새 무공',desc:'',type:'공격',tags:[],video:'',thumbnail:''});currentIndex=job.skills.length-1;loadSkill(currentIndex);}el('newSkillBtn').onclick=addSkill;el('deleteSkillBtn').onclick=()=>{const job=(data.jobs||[]).find(j=>j.id===currentJob);if(!job||!job.skills[currentIndex]) return;job.skills.splice(currentIndex,1);currentIndex=Math.max(0,currentIndex-1);renderSkillList();loadSkill(currentIndex);};['jobId','sname','stype','stags','sdesc','svideo','sthumb'].forEach(id=>el(id).addEventListener('input', syncSkill));el('saveLocalBtn').onclick=()=>{Freesoo.setLocal('skillsData', data);alert('같은 브라우저 즉시반영용 로컬 저장이 완료되었습니다.');};el('downloadBtn').onclick=()=>{syncSkill();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='skills.json';a.click();URL.revokeObjectURL(a.href);};async function uploadFile(file,key,contentType,cacheControl){if(!UPLOAD_TOKEN) throw new Error('업로드 토큰을 먼저 입력해 주세요.');cacheControl=cacheControl||'public, max-age=31536000, immutable';const endpoint=(Freesoo.cfg.UPLOAD_API_BASE||'').replace(/\/$/,'') + '/upload/' + key.split('/').map(encodeURIComponent).join('/');const res=await fetch(endpoint,{method:'PUT',headers:{'Authorization':'Bearer '+UPLOAD_TOKEN,'Content-Type':contentType,'X-Cache-Control':cacheControl},body:file});if(!res.ok) throw new Error('업로드 실패');return res.json();}function safeName(name){return String(name||'').replace(/[\/:*?"<>|]/g,'').trim();}async function createThumbnailFromVideo(file){return new Promise((resolve,reject)=>{const url=URL.createObjectURL(file);const video=document.createElement('video');video.preload='metadata';video.muted=true;video.playsInline=true;video.src=url;video.onloadeddata=()=>{video.currentTime=Math.min(1, Math.max(0, (video.duration||0)/4));};video.onseeked=()=>{const canvas=document.createElement('canvas');const ratio=(video.videoWidth&&video.videoHeight)?video.videoWidth/video.videoHeight:16/9;canvas.width=640;canvas.height=Math.round(640/ratio);const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0,canvas.width,canvas.height);canvas.toBlob(blob=>{URL.revokeObjectURL(url);if(blob) resolve(blob);else reject(new Error('썸네일 생성 실패'));}, 'image/jpeg', .86);};video.onerror=()=>reject(new Error('영상 썸네일 생성 실패'));});}async function handleVideoFile(file){if(!file) return;lastVideoFile=file;const jobId=el('jobId').value;const skillName=safeName(el('sname').value.trim());if(!skillName) return alert('먼저 무공명을 입력해 주세요.');try{const videoKey=`video/${jobId}_${skillName}.mp4`;const thumbKey=`thumbs/${jobId}_${skillName}.jpg`;await uploadFile(file, videoKey, file.type||'video/mp4');const thumbBlob=await createThumbnailFromVideo(file);await uploadFile(thumbBlob, thumbKey, 'image/jpeg', 'public, max-age=604800');el('svideo').value=`${(Freesoo.cfg.CDN_BASE||'').replace(/\/$/,'')}/${videoKey}`;el('sthumb').value=`${(Freesoo.cfg.CDN_BASE||'').replace(/\/$/,'')}/${thumbKey}`;syncSkill();alert('영상 업로드와 썸네일 생성이 완료되었습니다.');}catch(err){alert(err.message);}}const drop=el('videoDrop');drop.onclick=()=>el('videoFile').click();el('videoFile').onchange=()=>handleVideoFile(el('videoFile').files[0]);['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));drop.addEventListener('drop',e=>handleVideoFile(e.dataTransfer.files[0]));el('regenThumbBtn').onclick=async()=>{if(!lastVideoFile) return alert('먼저 이 세션에서 영상을 업로드해 주세요.');try{const jobId=el('jobId').value;const skillName=safeName(el('sname').value.trim());const thumbKey=`thumbs/${jobId}_${skillName}.jpg`;const blob=await createThumbnailFromVideo(lastVideoFile);await uploadFile(blob, thumbKey, 'image/jpeg', 'public, max-age=604800');el('sthumb').value=`${(Freesoo.cfg.CDN_BASE||'').replace(/\/$/,'')}/${thumbKey}`;syncSkill();}catch(err){alert(err.message);}};</script></body></html>
